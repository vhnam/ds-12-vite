name: Storybook

on:
  push:
    branches:
      - main
    paths:
      - "packages/ui/**"
      - "packages/design-tokens/**"
      - "apps/storybook/**"
  pull_request:
    paths:
      - "packages/ui/**"
      - "packages/design-tokens/**"
      - "apps/storybook/**"

concurrency:
  group: storybook-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  storybook:
    name: Test and visual review
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browsers
        run: pnpm --filter storybook exec playwright install --with-deps chromium

      - name: Run interaction tests
        run: pnpm --filter storybook run test-interactions

      - name: Build Storybook
        run: pnpm --filter storybook run build-storybook

      - name: Run tests
        run: pnpm --filter storybook run test-storybook

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/storybook/storybook-static

  deploy:
    name: Deploy to GitHub Pages
    needs: storybook
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
