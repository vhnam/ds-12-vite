name: Storybook

on:
  push:
    branches:
      - main
    paths:
      - "packages/ui/**"
      - "packages/design-tokens/**"
      - "apps/storybook/**"
  pull_request:
    paths:
      - "packages/ui/**"
      - "packages/design-tokens/**"
      - "apps/storybook/**"

concurrency:
  group: storybook-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: vp install

      - name: Detect tokens.json changes
        uses: dorny/paths-filter@v3
        id: tokens-filter
        with:
          filters: |
            tokens-json:
              - "packages/design-tokens/src/assets/tokens.json"

      - name: Build UI package
        if: steps.tokens-filter.outputs.tokens-json == 'true'
        working-directory: packages/ui
        run: pnpm build

      - name: Build Storybook
        run: pnpm --filter storybook run build-storybook

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
          retention-days: 1

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/storybook/storybook-static

  test:
    name: Test Storybook
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: vp install

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: apps/storybook/storybook-static

      - name: Install Playwright browsers
        run: pnpm --filter storybook exec playwright install --with-deps chromium

      - name: Run interaction tests
        run: pnpm --filter storybook run test-interactions

      - name: Run visual and a11y tests
        run: pnpm --filter storybook run test-storybook

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
