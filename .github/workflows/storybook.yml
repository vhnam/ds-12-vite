name: Storybook

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: storybook-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  storybook:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browsers
        run: vp run storybook#install-playwright

      - name: Run Storybook tests
        run: vp run storybook#test:storybook

      - name: Build Storybook
        run: vp run storybook#build-storybook
